server {
    listen 0.0.0.0:443 ssl;
    server_name jonnavar.42.fr;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    root /var/www/html;
    index index.html index.php;

    client_max_body_size 50M;

    location / {
	# essential for wordpress url rewriting (pretty permalinks)
        try_files $uri $uri/ /index.php?$args;
    }

    # ~ means case-sensitive regex
    # match any url ending in .php
    location ~ \.php$ {
	# includes default fastcgi parameters (a standard nginx file)
	# provides standard cgi environment variables needed for php
        include fastcgi_params;
	# send php request to the wordpress container on port 9000
	fastcgi_pass wordpress:9000;
	# default file for fastcgi when only a directory is requested
	# mostly redundant because "~ \.php$" only matches .php files
        fastcgi_index index.php;
	# transmits to php-fpm the absolute path to the php file to execute
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
	# passes path information to php
	# (e.g. in /index.php/some/path path_info would be /some/path)
        fastcgi_param PATH_INFO $fastcgi_path_info;
	# passes the original host header to php
	# wordpress uses this for site url generation, cookie domain, etc
        fastcgi_param HTTP_HOST $host;
    }

    # prevents the site from being embedded in an iframe
    # protects against clickjacking attacks
    add_header X-Frame-Options "SAMEORIGIN" always;
    # prevents browsers from mime-sniffing resources
    # protects against mime type confusion attacks
    add_header X-Content-Type-Options "nosniff" always;
    # enables browser's built-in xss filter and forces blocking
    # protects against reflected cross-site scripting attacks 
    # by blocking pages when an xss attack is detected
    add_header X-XSS-Protection "1; mode=block" always;
    
    # logs all requests to a file
    access_log /var/log/nginx/access.log;
    # logs errors and warnings
    error_log /var/log/nginx/error.log;

    # enables gzip compression for responses
    # improves page load speed by reducing file sizes
    gzip on;
    # adds "vary: accept-encoding" header
    # instructs caches to serve compressed/uncompressed 
    # versions based on client capabilities
    gzip_vary on;
    # enables compression for proxied requests (from php-fpm)
    gzip_proxied any;
    # sets compression level (1-9, 6 is good balance)
    # optimizes between cpu usage and file size
    gzip_comp_level 6;
    # specifies which mime types to compress
    # only compress text-based files that benefit from compression
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml image/svg+xml;
}
